<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Tablet</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    #status {
      position: absolute;
      z-index: 10;
      top: 8px;
      left: 8px;
      right: 8px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      font-size: 14px;
      line-height: 1.3;
    }

    #content {
      width: 100%;
      height: 100%;
      background: #000;
      text-align: center;
    }

    video,
    img {
      display: block;
      width: 100%;
      height: 100%;
      background: #000;
      border: 0;
    }

    #playBtn {
      position: absolute;
      z-index: 20;
      right: 16px;
      bottom: 16px;
      width: 72px;
      height: 72px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.4);
      background: rgba(0,0,0,0.65);
      color: #fff;
      font-size: 32px;
      display: none;
    }
  </style>
</head>
<body>
  <div id="status">iniciando...</div>
  <div id="content"></div>
  <button id="playBtn" aria-label="Reproduzir vídeo">&#9658;</button>

  <script>
    (function () {
      var mediaMap = {
        1: { type: "video", src: "media/videocar.mp4", poster: "media/poster1.jpg", label: "Tablet 1" },
        2: { type: "image", src: "media/imagem2.jpg", label: "Tablet 2" },
        3: { type: "image", src: "media/imagem3.jpg", label: "Tablet 3" },
        4: { type: "image", src: "media/imagem4.jpg", label: "Tablet 4" },
        5: { type: "image", src: "media/imagem5.jpg", label: "Tablet 5" },
        6: { type: "image", src: "media/imagem6.jpg", label: "Tablet 6" },
        7: { type: "video", src: "media/videocar.mp4", poster: "media/poster7.jpg", label: "Tablet 7" },
        8: { type: "image", src: "media/imagem8.jpg", label: "Tablet 8" },
        9: { type: "image", src: "media/imagem9.jpg", label: "Tablet 9" }
      };

      var content = document.getElementById("content");
      var statusBox = document.getElementById("status");
      var playBtn = document.getElementById("playBtn");
      var currentVideo = null;

      function setStatus(text) {
        statusBox.innerHTML = text;
      }

      function getParam(name) {
        var q = (window.location.search || "").replace(/^\?/, "");
        if (!q) return "";
        var parts = q.split("&");
        for (var i = 0; i < parts.length; i++) {
          var pair = parts[i].split("=");
          if (pair[0] === name) {
            return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
          }
        }
        return "";
      }

      function detectTablet() {
        var raw = getParam("tablet");
        if (!raw) raw = getParam("t");

        var n = parseInt(raw, 10);
        if (!isNaN(n) && n >= 1 && n <= 9) {
          return n;
        }

        var file = (window.location.pathname || "").split("/").pop().toLowerCase();
        var match = file.match(/tablet(\d+)\.html$/);
        if (match) {
          n = parseInt(match[1], 10);
          if (!isNaN(n) && n >= 1 && n <= 9) {
            return n;
          }
        }

        return 1;
      }

      function clearContent() {
        content.innerHTML = "";
        playBtn.style.display = "none";
        currentVideo = null;
      }

      function showMissing(message) {
        clearContent();

        var box = document.createElement("div");
        box.style.color = "#ffd166";
        box.style.padding = "20px";
        box.style.fontSize = "20px";
        box.style.lineHeight = "1.4";
        box.style.textAlign = "center";
        box.style.marginTop = "20%";
        box.innerHTML = message || "arquivo não encontrado";
        content.appendChild(box);

        setStatus("erro");
      }

      function showImage(item) {
        clearContent();

        var img = document.createElement("img");
        img.src = item.src;
        img.alt = item.label || "";
        img.onerror = function () {
          showMissing("Erro ao carregar imagem: " + item.src);
        };

        content.appendChild(img);
        setStatus((item.label || "Imagem") + " - imagem exibida");
      }

      function attachVideoEvents(video, item) {
        video.onloadedmetadata = function () {
          setStatus((item.label || "Vídeo") + " - metadados carregados");
        };

        video.onloadeddata = function () {
          setStatus((item.label || "Vídeo") + " - vídeo carregado");
        };

        video.oncanplay = function () {
          setStatus((item.label || "Vídeo") + " - pronto para reproduzir");
        };

        video.onplaying = function () {
          setStatus((item.label || "Vídeo") + " - reproduzindo");
          playBtn.style.display = "none";
        };

        video.onpause = function () {
          setStatus((item.label || "Vídeo") + " - pausado");
        };

        video.onerror = function () {
          if (item.poster) {
            showImage({ src: item.poster, label: item.label + " poster" });
            setStatus((item.label || "Vídeo") + " - erro no vídeo, exibindo poster");
          } else {
            showMissing("Erro ao carregar vídeo: " + item.src);
          }
        };
      }

      function tryPlay(video, item) {
        try {
          var r = video.play();

          if (r && typeof r.then === "function") {
            r.then(function () {
              setStatus((item.label || "Vídeo") + " - reproduzindo autoplay");
              playBtn.style.display = "none";
            }).catch(function () {
              setStatus((item.label || "Vídeo") + " - autoplay bloqueado, toque no play");
              playBtn.style.display = "block";
            });
          } else {
            setTimeout(function () {
              if (video.paused) {
                setStatus((item.label || "Vídeo") + " - aguardando play manual");
                playBtn.style.display = "block";
              } else {
                setStatus((item.label || "Vídeo") + " - reproduzindo");
                playBtn.style.display = "none";
              }
            }, 800);
          }
        } catch (e) {
          setStatus((item.label || "Vídeo") + " - erro ao iniciar");
          playBtn.style.display = "block";
        }
      }

      function showVideo(item) {
        clearContent();

        var video = document.createElement("video");
        currentVideo = video;

        video.autoplay = true;
        video.muted = true;
        video.loop = true;
        video.preload = "auto";
        video.controls = true;

        video.setAttribute("playsinline", "playsinline");
        video.setAttribute("webkit-playsinline", "webkit-playsinline");

        if (item.poster) {
          video.setAttribute("poster", item.poster);
        }

        var source = document.createElement("source");
        source.src = item.src;
        source.type = "video/mp4";
        video.appendChild(source);

        attachVideoEvents(video, item);

        content.appendChild(video);
        setStatus((item.label || "Vídeo") + " - carregando vídeo");

        setTimeout(function () {
          tryPlay(video, item);
        }, 500);
      }

      playBtn.onclick = function () {
        if (!currentVideo) return;

        try {
          var r = currentVideo.play();
          if (r && typeof r.then === "function") {
            r.then(function () {
              playBtn.style.display = "none";
              setStatus("reprodução manual iniciada");
            }).catch(function () {
              setStatus("não foi possível iniciar manualmente");
            });
          }
        } catch (e) {
          setStatus("erro ao tentar reprodução manual");
        }
      };

      var tabletId = detectTablet();
      var media = mediaMap[tabletId];

      if (!media) {
        showMissing("Tablet não configurado. Use ?tablet=1 até ?tablet=9.");
        return;
      }

      setStatus("tablet " + tabletId + " selecionado");

      if (media.type === "video") {
        showVideo(media);
      } else {
        showImage(media);
      }
    })();
  </script>
</body>
</html>
