<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk Tablet</title>
  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #000;
      color: #fff;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    body {
      position: relative;
    }

    #status {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 10;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.35;
      background: rgba(0, 0, 0, 0.7);
      white-space: pre-line;
    }

    #content {
      width: 100%;
      height: 100%;
      position: relative;
      background: #000;
    }

    video,
    img {
      width: 100%;
      height: 100%;
      border: 0;
      display: block;
      margin: 0;
      padding: 0;
      background: #000;
    }
  </style>
</head>
<body>
  <div id="status">iniciando</div>
  <div id="content"></div>

  <script>
    (function () {
      var mediaMap = {
        1: { type: "video", src: "media/videocar.mp4", label: "Tablet 1", poster: "media/poster1.jpg" },
        2: { type: "image", src: "media/imagem2.jpg", label: "Tablet 2" },
        3: { type: "image", src: "media/imagem3.jpg", label: "Tablet 3" },
        4: { type: "image", src: "media/imagem4.jpg", label: "Tablet 4" },
        5: { type: "image", src: "media/imagem5.jpg", label: "Tablet 5" },
        6: { type: "image", src: "media/imagem6.jpg", label: "Tablet 6" },
        7: { type: "video", src: "media/videocar.mp4", label: "Tablet 7", poster: "media/poster7.jpg" },
        8: { type: "image", src: "media/imagem8.jpg", label: "Tablet 8" },
        9: { type: "image", src: "media/imagem9.jpg", label: "Tablet 9" }
      };

      var status = document.getElementById("status");
      var content = document.getElementById("content");

      function setStatus(text) {
        status.textContent = text;
      }

      function logStatus(lines) {
        setStatus(lines.join("\n"));
      }

      function getParam(name) {
        var q = (window.location.search || "").replace(/^\?/, "");
        if (!q) {
          return "";
        }
        var parts = q.split("&");
        var i;
        var pair;

        for (i = 0; i < parts.length; i++) {
          pair = parts[i].split("=");
          if (pair[0] === name) {
            return decodeURIComponent((pair[1] || "").replace(/\+/g, " "));
          }
        }
        return "";
      }

      function detectTablet() {
        var raw = getParam("tablet");
        if (!raw) {
          raw = getParam("t");
        }
        if (raw) {
          var n = parseInt(raw, 10);
          if (!isNaN(n) && n >= 1 && n <= 9) {
            return n;
          }
        }

        var file = (window.location.pathname || "").split("/").pop().toLowerCase();
        var match = file.match(/tablet(\d+)\.html$/);
        if (match) {
          var n2 = parseInt(match[1], 10);
          if (!isNaN(n2) && n2 >= 1 && n2 <= 9) {
            return n2;
          }
        }

        return 1;
      }

      function clearContent() {
        content.innerHTML = "";
      }

      function showMessage(message) {
        clearContent();
        var box = document.createElement("div");
        box.style.color = "#ffd166";
        box.style.fontSize = "16px";
        box.style.padding = "18px";
        box.style.textAlign = "center";
        box.style.position = "absolute";
        box.style.top = "50%";
        box.style.left = "50%";
        box.style.transform = "translate(-50%, -50%)";
        box.style.maxWidth = "90%";
        box.style.background = "#111";
        box.style.border = "1px solid #333";
        box.style.lineHeight = "1.4";
        box.textContent = message;
        content.appendChild(box);
      }

      function showImage(item) {
        clearContent();

        var img = document.createElement("img");
        img.src = item.src;
        img.alt = item.label || "Imagem";
        img.onerror = function () {
          showMessage("Imagem não carregou: " + item.src);
        };

        content.appendChild(img);
        logStatus(["tablet " + item._tablet, item.label, "imagem carregando: " + item.src]);
      }

      function errorMessageFromVideo(video, item) {
        var e = video.error;
        var msg = "Erro do video";
        if (e) {
          var reason = "DESCONHECIDO";
          if (e.code === 1) reason = "1 (aborto)";
          if (e.code === 2) reason = "2 (rede)";
          if (e.code === 3) reason = "3 (decodificação)";
          if (e.code === 4) reason = "4 (formato não suportado)";
          msg = "Erro do vídeo: " + reason;
        }
        msg += " - " + item.src;
        showMessage(msg + ". Exibindo fallback/arquivo de mídia.");

        if (item.poster) {
          showImage({ src: item.poster, label: "Poster de " + item.label });
          return;
        }

        setStatus(msg);
      }

      function canPlayMp4() {
        var test = document.createElement("video");
        var codecs = 'video/mp4; codecs="avc1.42E01E, mp4a.40.2"';
        var result = test.canPlayType("video/mp4");
        var result2 = test.canPlayType(codecs);
        return {
          plain: result || "não",
          codecs: result2 || "não"
        };
      }

      function showVideo(item) {
        clearContent();

        var video = document.createElement("video");
        video.setAttribute("autoplay", "autoplay");
        video.setAttribute("muted", "muted");
        video.setAttribute("loop", "loop");
        video.setAttribute("preload", "auto");
        video.setAttribute("playsinline", "playsinline");
        video.setAttribute("webkit-playsinline", "webkit-playsinline");
        video.setAttribute("poster", item.poster || "");
        video.controls = false;
        video.src = item.src;

        var support = canPlayMp4();

        video.onloadstart = function () {
          logStatus([
            "tablet " + item._tablet,
            item.label,
            "video src: " + item.src,
            "canPlayType(mp4): " + support.plain,
            "canPlayType(avc1/mp4a): " + support.codecs,
            "iniciando..."
          ]);
        };

        video.onloadedmetadata = function () {
          logStatus([
            "tablet " + item._tablet,
            item.label,
            "metadata ok",
            "duração: " + (isNaN(video.duration) ? "n/a" : Math.round(video.duration) + "s")
          ]);
        };

        video.oncanplay = function () {
          logStatus([
            "tablet " + item._tablet,
            item.label,
            "pronto para tocar"
          ]);
          try {
            var r = video.play();
            if (!r) {
              logStatus(["tablet " + item._tablet, item.label, "play() sem retorno"]);
            }
          } catch (e2) {
            logStatus(["tablet " + item._tablet, item.label, "play() lançou exceção", String(e2.message || e2)]);
          }
        };

        video.onplaying = function () {
          logStatus([
            "tablet " + item._tablet,
            item.label,
            "reproduzindo"
          ]);
        };

        video.onpause = function () {
          logStatus([
            "tablet " + item._tablet,
            item.label,
            "pausado"
          ]);
        };

        video.onerror = function () {
          errorMessageFromVideo(video, item);
        };

        video.addEventListener("stalled", function () {
          logStatus(["tablet " + item._tablet, item.label, "estabelecendo conexão..."]);
        });

        content.appendChild(video);
        setStatus("carregando vídeo");
      }

      function main() {
        var tabletId = detectTablet();
        var media = mediaMap[tabletId];

        if (!media) {
          showMessage("Tablet não configurado. Use ?tablet=1 até ?tablet=9");
          setStatus("tablet inválido");
          return;
        }

        media._tablet = tabletId;

        if (media.type === "video") {
          showVideo(media);
        } else {
          showImage(media);
        }
      }

      main();
    })();
  </script>
</body>
</html>
