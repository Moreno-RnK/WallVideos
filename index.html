<!DOCTYPE html>
<html>
<head>
<meta http-equiv="refresh" content="3600">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<style>
body{
  margin:0;
  background:black;
}

video,img{
  width:100vw;
  height:100vh;
  object-fit:cover;
}
</style>

</head>
<body>

<div id="container"></div>

<script>

// lista de conteúdos para cada tablet
const screens = {
  1: { type: "video", src: "media/videocar.mp4", fallback: "media/videocar.jpg" },
  2: { type: "video", src: "media/video2.mp4" },
  3: { type: "video", src: "media/video3.mp4" },
  4: { type: "image", src: "media/imagem4.jpg" },
  5: { type: "video", src: "media/video5.mp4" },
  6: { type: "image", src: "media/imagem6.jpg" },
  7: { type: "video", src: "media/video7.mp4" },
  8: { type: "image", src: "media/imagem8.jpg" },
  9: { type: "video", src: "media/video9.mp4" }
};

// Pegar id do tablet da URL
const params = new URLSearchParams(window.location.search);
const screenId = params.get("screen") || "1";

const container = document.getElementById("container");
const media = screens[screenId];

if(media){
  if(media.type === "video"){
    const video = document.createElement("video");
    video.id = "media";
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;

    const source = document.createElement("source");
    source.src = media.src;
    source.type = "video/mp4";

    video.appendChild(source);

    // Fallback: se não carregar vídeo, mostra imagem
    video.onerror = () => {
      const img = document.createElement("img");
      img.id = "media";
      img.src = media.fallback || "";
      container.innerHTML = "";
      container.appendChild(img);
    }

    container.appendChild(video);

  } else if(media.type === "image"){
    const img = document.createElement("img");
    img.id = "media";
    img.src = media.src;
    container.appendChild(img);
  }
} else {
  container.innerHTML = "<p style='color:white;text-align:center;margin-top:50%;'>Nenhum conteúdo configurado para este tablet.</p>";
}
</script>

</body>

</html>
